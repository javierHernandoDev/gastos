version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: gastos-db
    environment:
      POSTGRES_DB: gastos
      POSTGRES_USER: gastos_user
      POSTGRES_PASSWORD: gastos_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gastos_user -d gastos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
