spring.application.name=gastos-backend
server.port=${PORT:8080}

# PostgreSQL — Railway sets SPRING_DATASOURCE_URL etc. via env vars
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gastos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gastos_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gastos_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# Custom uploads directory
app.uploads.dir=${UPLOADS_DIR:uploads}
app.uploads.base-url=${APP_BASE_URL:http://localhost:8080}/files

# JWT
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3Qgc2lnbmluZyAhYWJj}

# Mail (configure MAIL_HOST, MAIL_USERNAME, MAIL_PASSWORD in env vars)
resend.api-key=${RESEND_API_KEY:}
